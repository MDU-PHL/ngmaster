[workspace]
authors = ["Himal Shrestha"]
channels = ["conda-forge", "nodefaults", "bioconda", "r"]
name = "ngmaster-env"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
test = { cmd = "pytest tests/ -v --tb=short", description = "Run full test suite (unit + integration)" }
test-unit = { cmd = "pytest tests/test_utils.py -v --tb=short", description = "Run unit tests only (no mlst required)" }
test-integration = { cmd = "pytest tests/test_cli.py -v --tb=short", description = "Run CLI integration tests (requires mlst)" }

[dependencies]
# --- core runtime ---
python = ">=3.9,<3.13"
pip = ">=23"
setuptools = ">=67"
wheel = ">=0.40"

# --- ngmaster direct dependencies ---
biopython = ">=1.81"
requests = ">=2.33.0"
urllib3 = ">=2.7.0"
certifi = ">=2023.7.22"
idna = ">=3.15"
numpy = ">=1.26.5"

# --- bioinformatics tools ---
any2fasta = ">=0.4.2"
blast = ">=2.16.0"
blast-legacy = ">=2.2.26"
clustalo = ">=1.2.4"
clustalw = ">=2.1"
csvtk = ">=0.31"
entrez-direct = ">=22.1"
mafft = ">=7.525"
mlst = ">=2.25.0"
muscle = ">=5.1"
paml = ">=4.10.6"
parallel = ">=20230522"
poa = ">=2.0"
t-coffee = ">=12.0"
viennarna = ">=2.5.1"
wget = ">=1.20"

# --- perl (mlst runtime) ---
perl = ">=5.32"

[pypi-dependencies]
setuptools = ">=67"
argparse = "==1.4.0"
beautifulsoup4 = ">=4.12, <5"
bs4 = "==0.0.1"
soupsieve = ">=2.4"
mlstdb = "==1.0.0"
